on:
  push:
    branches: [ dev, main ]
    paths:
      - 'setup/**'
      - 'bridge/**'
      - 'service/**'
      - 'tests/**'
      - '.github/workflows/test_provisioning.yml'
  pull_request:
    paths:
      - 'setup/**'
      - 'bridge/**'
      - 'service/**'
      - 'tests/**'
      - '.github/workflows/test_provisioning.yml'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

name: Provisioning lifecycle tests

permissions: read-all

jobs:
  provision:
    name: Provision (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:

      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      # ── Install edamame_posture (real MCP server) ───────────────
      # PSK pairing mode: install posture CLI, generate PSK, start MCP.
      # App pairing mode (optional): the plugin control center UI handles
      # pairing with the EDAMAME desktop app -- not tested in CI.

      - name: Install edamame_posture (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          echo "--- Installing edamame_posture ---"
          curl --proto '=https' --tlsv1.2 -sSf \
            https://raw.githubusercontent.com/edamametechnologies/edamame_posture_cli/main/install.sh \
            | sudo sh -s -- --force-binary
          echo "--- edamame_posture installed ---"
          edamame_posture --version || true

      - name: Install edamame_posture (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          echo "--- Installing edamame_posture ---"
          curl --proto '=https' --tlsv1.2 -sSf \
            https://raw.githubusercontent.com/edamametechnologies/edamame_posture_cli/main/install.sh \
            | sh -s -- --force-binary
          echo "--- edamame_posture installed ---"
          edamame_posture.exe --version || "$HOME/edamame_posture.exe" --version || true

      - name: Generate PSK
        shell: bash
        run: |
          PSK=$(edamame_posture mcp-generate-psk 2>/dev/null | head -n1 || \
                "$HOME/edamame_posture" mcp-generate-psk 2>/dev/null | head -n1 || \
                "$HOME/edamame_posture.exe" mcp-generate-psk 2>/dev/null | head -n1)
          if [ -z "$PSK" ] || [ ${#PSK} -lt 32 ]; then
            echo "FAIL: could not generate PSK (got: '$PSK')"
            exit 1
          fi
          echo "EDAMAME_PSK=$PSK" >> "$GITHUB_ENV"
          echo "PSK generated (${#PSK} chars)"

      - name: Start daemon + MCP server (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          echo "--- Starting daemon (disconnected) ---"
          sudo edamame_posture background-start-disconnected
          sleep 5
          echo "--- Starting MCP server ---"
          sudo edamame_posture mcp-start 3000 "$EDAMAME_PSK"
          echo "MCP server started on port 3000"

      - name: Start daemon + MCP server (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          echo "--- Starting daemon (disconnected) ---"
          CMD=$(command -v edamame_posture.exe 2>/dev/null || echo "$HOME/edamame_posture.exe")
          "$CMD" background-start-disconnected
          sleep 8
          echo "--- Starting MCP server ---"
          "$CMD" mcp-start 3000 "$EDAMAME_PSK"
          echo "MCP server started on port 3000"

      - name: Verify MCP server responds
        shell: bash
        run: |
          RESPONSE=$(curl -sf -X POST http://127.0.0.1:3000/mcp \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer $EDAMAME_PSK" \
            -d '{"jsonrpc":"2.0","id":1,"method":"tools/list","params":{}}') || {
            echo "FAIL: MCP server not responding"; exit 1
          }
          echo "MCP tools/list response (first 500 chars):"
          echo "$RESPONSE" | head -c 500
          echo ""
          echo "MCP server verified"

      # ── Install plugin ──────────────────────────────────────────

      - name: Run install (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          echo "--- Running install.sh ---"
          bash setup/install.sh "$PWD"
          echo "--- Install completed ---"

      - name: Run install (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Write-Host "--- Running install.ps1 ---"
          & "$PWD\setup\install.ps1" -WorkspaceRoot "$PWD"
          Write-Host "--- Install completed ---"

      # ── Resolve paths ────────────────────────────────────────────

      - name: Resolve installed paths (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          if [ "$(uname)" = "Darwin" ]; then
            INSTALL_ROOT="$HOME/Library/Application Support/cursor-edamame/current"
            CONFIG_DIR="$HOME/Library/Application Support/cursor-edamame"
            STATE_DIR="$HOME/Library/Application Support/cursor-edamame/state"
            GLOBAL_MCP="$HOME/.cursor/mcp.json"
          else
            INSTALL_ROOT="${XDG_DATA_HOME:-$HOME/.local/share}/cursor-edamame/current"
            CONFIG_DIR="${XDG_CONFIG_HOME:-$HOME/.config}/cursor-edamame"
            STATE_DIR="${XDG_STATE_HOME:-$HOME/.local/state}/cursor-edamame"
            GLOBAL_MCP="$HOME/.cursor/mcp.json"
          fi
          echo "INSTALL_ROOT=$INSTALL_ROOT" >> "$GITHUB_ENV"
          echo "CONFIG_DIR=$CONFIG_DIR" >> "$GITHUB_ENV"
          echo "STATE_DIR=$STATE_DIR" >> "$GITHUB_ENV"
          echo "GLOBAL_MCP=$GLOBAL_MCP" >> "$GITHUB_ENV"
          echo "CONFIG_PATH=$CONFIG_DIR/config.json" >> "$GITHUB_ENV"

      - name: Resolve installed paths (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $InstallRoot = Join-Path $env:LOCALAPPDATA "cursor-edamame\current"
          $ConfigDir   = Join-Path $env:APPDATA "cursor-edamame"
          $StateDir    = Join-Path $env:LOCALAPPDATA "cursor-edamame\state"
          $GlobalMcp   = Join-Path $env:USERPROFILE ".cursor\mcp.json"
          "INSTALL_ROOT=$InstallRoot"   | Out-File -Append $env:GITHUB_ENV -Encoding utf8
          "CONFIG_DIR=$ConfigDir"       | Out-File -Append $env:GITHUB_ENV -Encoding utf8
          "STATE_DIR=$StateDir"         | Out-File -Append $env:GITHUB_ENV -Encoding utf8
          "GLOBAL_MCP=$GlobalMcp"       | Out-File -Append $env:GITHUB_ENV -Encoding utf8
          "CONFIG_PATH=$ConfigDir\config.json" | Out-File -Append $env:GITHUB_ENV -Encoding utf8

      # ── Verify installed layout ──────────────────────────────────

      - name: Verify installed layout (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          echo "--- Checking installed files ---"
          FAIL=0
          for f in \
            "$INSTALL_ROOT/bridge/cursor_edamame_mcp.mjs" \
            "$INSTALL_ROOT/service/config.mjs" \
            "$INSTALL_ROOT/service/health.mjs" \
            "$INSTALL_ROOT/setup/install.sh" \
            "$INSTALL_ROOT/package.json" \
            "$CONFIG_PATH"; do
            if [ -f "$f" ]; then
              echo "  OK: $f"
            else
              echo "  FAIL: $f not found"
              FAIL=1
            fi
          done
          [ "$FAIL" -eq 0 ] || exit 1
          echo "--- Layout verified ---"

      - name: Verify installed layout (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Write-Host "--- Checking installed files ---"
          $fail = $false
          $files = @(
            "$env:INSTALL_ROOT\bridge\cursor_edamame_mcp.mjs",
            "$env:INSTALL_ROOT\service\config.mjs",
            "$env:INSTALL_ROOT\service\health.mjs",
            "$env:INSTALL_ROOT\setup\install.ps1",
            "$env:INSTALL_ROOT\package.json",
            "$env:CONFIG_PATH"
          )
          foreach ($f in $files) {
            if (Test-Path $f) { Write-Host "  OK: $f" }
            else { Write-Host "  FAIL: $f not found"; $fail = $true }
          }
          if ($fail) { exit 1 }
          Write-Host "--- Layout verified ---"

      # ── Verify package.json version ──────────────────────────────

      - name: Verify package.json version
        shell: bash
        run: |
          node -e "
            const path = require('path');
            const p = path.join(process.env.INSTALL_ROOT, 'package.json');
            const pkg = JSON.parse(require('fs').readFileSync(p, 'utf8'));
            if (!pkg.version) { console.error('FAIL: no version'); process.exit(1); }
            console.log('Installed version:', pkg.version);
          "

      # ── Verify global MCP registration ──────────────────────────

      - name: Verify global MCP config
        shell: bash
        run: |
          echo "--- Checking global MCP config ---"
          node -e "
            const fs = require('fs');
            const p = process.env.GLOBAL_MCP;
            if (!fs.existsSync(p)) { console.error('FAIL: ' + p + ' not found'); process.exit(1); }
            const cfg = JSON.parse(fs.readFileSync(p, 'utf8'));
            const entry = cfg?.mcpServers?.edamame;
            if (!entry) { console.error('FAIL: mcpServers.edamame missing'); process.exit(1); }
            if (!entry.command) { console.error('FAIL: command missing'); process.exit(1); }
            if (!entry.args || !entry.args.length) { console.error('FAIL: args missing'); process.exit(1); }
            console.log('MCP entry OK:', JSON.stringify(entry).slice(0, 200));
          "
          echo "--- Global MCP verified ---"

      # ── PSK pairing with real posture MCP ──────────────────────

      - name: Write PSK to plugin state
        shell: bash
        run: |
          PSK_FILE="$STATE_DIR/edamame-mcp.psk"
          mkdir -p "$(dirname "$PSK_FILE")"
          echo -n "$EDAMAME_PSK" > "$PSK_FILE"
          echo "PSK written to $PSK_FILE"

      # ── Healthcheck via real MCP ────────────────────────────────

      - name: Run healthcheck against real MCP
        shell: bash
        env:
          EDAMAME_MCP_ENDPOINT: http://127.0.0.1:3000/mcp
        run: |
          echo "--- Running healthcheck ---"
          node "$INSTALL_ROOT/service/healthcheck_cli.mjs" --config "$CONFIG_PATH" --json || true
          echo "--- Healthcheck completed ---"

      # ── Stop MCP server ─────────────────────────────────────────

      - name: Stop daemon (Unix)
        if: always() && runner.os != 'Windows'
        shell: bash
        run: |
          sudo edamame_posture stop 2>/dev/null || true
          echo "Daemon stopped"

      - name: Stop daemon (Windows)
        if: always() && runner.os == 'Windows'
        shell: bash
        run: |
          CMD=$(command -v edamame_posture.exe 2>/dev/null || echo "$HOME/edamame_posture.exe")
          "$CMD" stop 2>/dev/null || true
          echo "Daemon stopped"

      # ── Uninstall ────────────────────────────────────────────────

      - name: Uninstall (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          echo "--- Uninstalling ---"
          rm -rf "$INSTALL_ROOT"
          rm -rf "$CONFIG_DIR"
          rm -rf "$STATE_DIR"

          if [ -f "$GLOBAL_MCP" ]; then
            node -e "
              const fs = require('fs');
              const p = process.env.GLOBAL_MCP;
              const cfg = JSON.parse(fs.readFileSync(p, 'utf8'));
              if (cfg.mcpServers && cfg.mcpServers.edamame) {
                delete cfg.mcpServers.edamame;
                fs.writeFileSync(p, JSON.stringify(cfg, null, 2));
                console.log('Removed edamame from MCP config');
              }
            "
          fi
          echo "--- Uninstall completed ---"

      - name: Uninstall (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Write-Host "--- Uninstalling ---"
          if (Test-Path $env:INSTALL_ROOT) { Remove-Item -Recurse -Force $env:INSTALL_ROOT }
          if (Test-Path $env:CONFIG_DIR)   { Remove-Item -Recurse -Force $env:CONFIG_DIR }
          if (Test-Path $env:STATE_DIR)    { Remove-Item -Recurse -Force $env:STATE_DIR }

          if (Test-Path $env:GLOBAL_MCP) {
            $cfg = Get-Content -Raw $env:GLOBAL_MCP | ConvertFrom-Json
            if ($cfg.mcpServers.PSObject.Properties["edamame"]) {
              $cfg.mcpServers.PSObject.Properties.Remove("edamame")
              $cfg | ConvertTo-Json -Depth 10 | Set-Content $env:GLOBAL_MCP -Encoding UTF8
              Write-Host "Removed edamame from MCP config"
            }
          }
          Write-Host "--- Uninstall completed ---"

      # ── Verify uninstall ─────────────────────────────────────────

      - name: Verify uninstall (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          echo "--- Verifying uninstall ---"
          FAIL=0
          if [ -d "$INSTALL_ROOT" ]; then
            echo "FAIL: install dir still exists: $INSTALL_ROOT"
            FAIL=1
          else
            echo "  OK: install dir removed"
          fi

          if [ -f "$GLOBAL_MCP" ]; then
            node -e "
              const cfg = JSON.parse(require('fs').readFileSync(process.env.GLOBAL_MCP, 'utf8'));
              if (cfg?.mcpServers?.edamame) { console.error('FAIL: edamame entry still in MCP config'); process.exit(1); }
              console.log('  OK: edamame entry removed from MCP config');
            "
          else
            echo "  OK: MCP config file removed or never existed"
          fi
          [ "$FAIL" -eq 0 ] || exit 1
          echo "--- Uninstall verified ---"

      - name: Verify uninstall (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Write-Host "--- Verifying uninstall ---"
          $fail = $false
          if (Test-Path $env:INSTALL_ROOT) {
            Write-Host "FAIL: install dir still exists: $env:INSTALL_ROOT"
            $fail = $true
          } else {
            Write-Host "  OK: install dir removed"
          }
          if (Test-Path $env:GLOBAL_MCP) {
            $cfg = Get-Content -Raw $env:GLOBAL_MCP | ConvertFrom-Json
            if ($cfg.mcpServers.PSObject.Properties["edamame"]) {
              Write-Host "FAIL: edamame entry still in MCP config"
              $fail = $true
            } else {
              Write-Host "  OK: edamame entry removed from MCP config"
            }
          } else {
            Write-Host "  OK: MCP config file removed or never existed"
          }
          if ($fail) { exit 1 }
          Write-Host "--- Uninstall verified ---"

      # ── Slack alert ──────────────────────────────────────────────

      - name: Slack alert on failure
        if: failure()
        uses: slackapi/slack-github-action@v1.26.0
        with:
          channel-id: "C072J0U9TH7"
          slack-message: |
            *edamame_cursor Provisioning CI Failed*
            Repository: ${{ github.repository }}
            Branch: ${{ github.ref }}
            OS: ${{ matrix.os }}
            Run: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
        continue-on-error: true
