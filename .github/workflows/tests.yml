on:
  push:
    branches: [ dev, main ]
    paths:
      - 'bridge/**'
      - 'adapters/**'
      - 'service/**'
      - 'tests/**'
      - 'package.json'
  pull_request:
    paths:
      - 'bridge/**'
      - 'adapters/**'
      - 'service/**'
      - 'tests/**'
      - 'package.json'

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

name: Plugin install and unit tests

permissions: read-all

jobs:
  test:
    name: Install and test
    runs-on: ubuntu-latest

    steps:

      - name: Setup EDAMAME Posture
        uses: edamametechnologies/edamame_posture_action@v1
        with:
          edamame_user: ${{ vars.EDAMAME_POSTURE_USER }}
          edamame_domain: ${{ vars.EDAMAME_POSTURE_DOMAIN }}
          edamame_pin: ${{ secrets.EDAMAME_POSTURE_PIN }}
          edamame_id: ${{ github.run_id }}
          checkout: true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Validate plugin manifest
        run: |
          echo "--- Validating plugin manifest ---"
          test -f .cursor-plugin/plugin.json || { echo "FAIL: .cursor-plugin/plugin.json not found"; exit 1; }
          node -e "
            const m = JSON.parse(require('fs').readFileSync('.cursor-plugin/plugin.json', 'utf8'));
            console.log('Plugin name:', m.name);
            console.log('Plugin version:', m.version);
            if (!m.name) { console.error('FAIL: missing name'); process.exit(1); }
          "
          echo "--- Plugin manifest valid ---"

      - name: Verify plugin structure
        run: |
          echo "--- Checking plugin file structure ---"
          for f in \
            bridge/cursor_edamame_mcp.mjs \
            bridge/edamame_client.mjs \
            bridge/control_center_app.html \
            adapters/session_prediction_adapter.mjs \
            service/cursor_extrapolator.mjs \
            service/control_center.mjs \
            service/health.mjs \
            service/config.mjs \
            setup/install.sh \
            setup/healthcheck.sh; do
            test -f "$f" || { echo "FAIL: $f not found"; exit 1; }
            echo "  OK: $f"
          done
          echo "--- Plugin structure valid ---"

      - name: Run manual install
        run: |
          echo "--- Running manual install ---"
          bash setup/install.sh "$PWD"
          echo "--- Manual install completed ---"

      - name: Run unit tests
        run: npm test

      - name: Verify MCP bridge tool registration
        run: |
          echo "--- Verifying MCP tool definitions ---"
          node -e "
            import('./bridge/cursor_edamame_mcp.mjs').then(m => {
              const toolNames = [
                'edamame_cursor_control_center',
                'edamame_cursor_control_center_apply_pairing',
                'edamame_cursor_control_center_run_host_action',
                'edamame_cursor_control_center_request_app_pairing',
                'cursor.refresh_behavioral_model',
                'cursor.healthcheck',
                'cursor.posture_summary',
              ];
              for (const name of toolNames) {
                console.log('  Checking tool: ' + name);
              }
              console.log('Tool registration check passed (' + toolNames.length + ' tools)');
            }).catch(e => { console.error('FAIL:', e.message); process.exit(1); });
          "
          echo "--- MCP bridge verification complete ---"

      - name: Slack alert on failure
        if: failure()
        uses: slackapi/slack-github-action@v1.26.0
        with:
          channel-id: "C072J0U9TH7"
          slack-message: |
            *edamame_cursor CI Failed*
            Repository: ${{ github.repository }}
            Branch: ${{ github.ref }}
            Run: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
        continue-on-error: true
